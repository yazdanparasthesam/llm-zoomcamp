volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local
  kestra_tmp:
    driver: local

services:
  kestra_postgres:
    image: postgres:18
    network_mode: "host"
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    image: kestra/kestra:v1.3.21
      #pull_policy: always
    user: "root"
    network_mode: "host"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      SECRET_GEMINI_API_KEY: ${SECRET_GEMINI_API_KEY}
      SECRET_TAVILY_API_KEY: ${SECRET_TAVILY_API_KEY}
      SECRET_OPENAI_API_KEY: ${SECRET_OPENAI_API_KEY}
      JAVA_OPTS: >-
        -Dhttp.proxyHost=192.168.70.135
        -Dhttp.proxyPort=3128
        -Dhttps.proxyHost=192.168.70.135
        -Dhttps.proxyPort=3128
        -Dhttp.nonProxyHosts=localhost|127.0.0.1
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://127.0.0.1:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        endpoints:
          all:
            port: 8083
        micronaut:
          http:
            services:
              api:
                url: https://api.kestra.io
                proxy-type: http
                proxy-address: 192.168.70.135:3128
                follow-redirects: true
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: Admin1234!
          tutorialFlows:
            enabled: false
          community:
            enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
          ai:
            type: gemini
            gemini:
              model-name: gemini-2.5-flash
              api-key: ${GEMINI_API_KEY}
    depends_on:
      kestra_postgres:
        condition: service_healthy

